:root{

 --card:#FFFFFF;--card-foreground:#1D2233;
 --popover:#FFFFFF;--popover-foreground:#1D2233;
 --primary:#0066B3;--primary-foreground:#FFFFFF;
 --secondary:#17479D;--secondary-foreground:#FFFFFF;
 --muted:#E4E4E4;--muted-foreground:#557499;
 --accent:#F5F8FB;--accent-foreground:#0066B3;
 --destructive:#EC1C24;--destructive-foreground:#FFFFFF;
 --border:#E4E4E4;--input:#C1C1C1;--ring:#0066B3;--radius:16px;
 --chart-1:#DD6E0A;--chart-2:#00915D;--chart-3:#880033;--chart-4:#17479D;--chart-5:#EC1C24;

 --font-sans:'Open Sans',system-ui,sans-serif;
 --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
 --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{box-sizing:border-box;}
body{margin:0;}
img{display:block;max-width:100%;}
a{color:var(--primary);text-decoration:none;}
a:hover{color:var(--secondary);}
@keyframes headFade{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes blobA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(80px,50px) scale(1.15)}}
@keyframes blobB{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-70px,70px) scale(1.1)}}
@keyframes blobC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-60px) scale(1.2)}}
@keyframes auroraDrift{0%{background-position:0% 50%,100% 50%,50% 0%}50%{background-position:100% 50%,0% 50%,50% 100%}100%{background-position:0% 50%,100% 50%,50% 0%}}
@keyframes gridPan{from{background-position:0 0}to{background-position:64px 64px}}
@keyframes ringPop{0%{transform:translate(-50%,-50%) scale(.2);opacity:.7}100%{transform:translate(-50%,-50%) scale(2.4);opacity:0}}
@media (hover:none),(pointer:coarse){[data-cursor-ring],[data-glow]{display:none !important}}
@media (max-width:1024px){
 [data-pad]{padding-inline:24px !important;}
 [data-rsp="foot"]{grid-template-columns:repeat(2,1fr) !important;gap:36px 28px !important;}
 [data-newsgrid]{gap:24px !important;}
}
@media (max-width:920px){
 [data-nav]{display:none !important;}
 [data-burger]{display:grid !important;}
 [data-newsgrid]{grid-template-columns:1fr 1fr !important;}
 [data-featured]{grid-column:1 / -1 !important;}
}
@media (max-width:700px){
 [data-pad]{padding-inline:16px !important;}
 [data-rsp="foot"]{grid-template-columns:1fr !important;gap:26px !important;}
 [data-newsgrid]{grid-template-columns:1fr !important;}
 [data-heroimg]{aspect-ratio:4/3 !important;}
}
@media (max-width:480px){
 [data-hlogo]{height:34px !important;}
}
@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms !important;animation-iteration-count:1 !important;animation-delay:0ms !important;transition-duration:.001ms !important;}}
</style>

class Component extends DCLogic {
  state = { scrolled:false, menuOpen:false, filter:'All' };

  componentDidMount(){
    const R = this.R = !!(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);

    this.setupReveals(R);
    this.setupHeadings(R);

    this.setupCursorFizz(R);
    this._sweep = () => {
      if (this._pending) this._pending.forEach(el => { if (el.getBoundingClientRect().bottom < 60) this._instantShow(el); });
      if (this._pendingH) this._pendingH.forEach(h => { if (h.getBoundingClientRect().bottom < 60) this._instantHead(h); });
    };
    this.blobs = Array.prototype.slice.call(document.querySelectorAll('[data-blob]'));
    this._onScroll = () => {
      const s = window.scrollY > 80; if (s !== this.state.scrolled) this.setState({ scrolled:s });
      if (this._sweep) this._sweep();
    };
    window.addEventListener('scroll', this._onScroll, { passive:true });
    if (!R) { this.setupMagnetic(); this.loop(); }
  }

  componentWillUnmount(){
    this._alive = false;
    window.removeEventListener('scroll', this._onScroll);
    if (this._io) this._io.disconnect();
    if (this._ioH) this._ioH.disconnect();
    if (this._raf) cancelAnimationFrame(this._raf);
    if (this._fizzRaf) cancelAnimationFrame(this._fizzRaf);
    if (this._cursorMove) window.removeEventListener('mousemove', this._cursorMove);
    if (this._cursorClick) window.removeEventListener('mousedown', this._cursorClick);
    if (this._cursorLeave) document.removeEventListener('mouseleave', this._cursorLeave);
    if (this._onResizeFizz) window.removeEventListener('resize', this._onResizeFizz);
  }

  componentDidUpdate(){
    if (!this._shown) return;
    this._shown.forEach(el => {
      if (el.style.opacity === '0') el.style.removeProperty('opacity');
      if ((el.style.clipPath || '').indexOf('100%') !== -1) el.style.removeProperty('clip-path');
    });
  }

  splitWords(h){
    const byLines = h.hasAttribute('data-bylines');
    let line = 0; const words = [];
    const mk = (content) => {
      const mask = document.createElement('span');
      mask.style.cssText = 'display:inline-block;overflow:hidden;vertical-align:top;padding-bottom:.08em;margin-bottom:-.08em';
      const inner = document.createElement('span');
      inner.style.cssText = 'display:inline-block;transform:translateY(115%) rotate(1.5deg);transition:transform .8s var(--ease-out-expo);will-change:transform';
      inner.textContent = content;
      inner._line = line; words.push(inner); mask.appendChild(inner);
      return mask;
    };
    const walk = (node) => {
      Array.prototype.slice.call(node.childNodes).forEach(n => {
        if (n.nodeType === 3) {
          if (!n.textContent.trim()) return;
          const frag = document.createDocumentFragment();
          n.textContent.split(/(\s+)/).forEach(w => {
            if (/^\s*$/.test(w)) { frag.appendChild(document.createTextNode(w)); return; }
            frag.appendChild(mk(w));
          });
          n.replaceWith(frag);
        } else if (n.nodeType === 1) {
          if (n.tagName === 'BR') { line++; return; }
          walk(n);
        }
      });
    };
    walk(h);
    words.forEach((w, i) => { w._delay = (byLines ? w._line : i) * 130; });
    h._words = words;
  }

  revealClips(el){
    const list = el.hasAttribute('data-imgclip') ? [el] : [];
    return list.concat(Array.prototype.slice.call(el.querySelectorAll('[data-imgclip]')));
  }

  setupReveals(R){
    const targets = Array.prototype.slice.call(document.querySelectorAll('[data-reveal]'));
    const done = (el) => {
      el.style.removeProperty('opacity'); el.style.removeProperty('transform');
      if (el._t0) el.style.transition = el._t0; else el.style.removeProperty('transition');
      this.revealClips(el).forEach(c => {
        c.style.removeProperty('clip-path');
        if (c !== el) { if (c._t0) c.style.transition = c._t0; else c.style.removeProperty('transition'); }
      });
      this._shown.add(el);
    };
    if (R || !('IntersectionObserver' in window)) { targets.forEach(el => this._shown.add(el)); return; }
    targets.forEach(el => {
      el._t0 = el.style.transition;
      el.style.transition = 'none'; el.style.opacity = '0';
      el.style.transform = el.getAttribute('data-enter') || 'translateY(26px)';
      this.revealClips(el).forEach(c => {
        const round = (c.getAttribute('data-clip') || '').match(/round [^)]+/);
        if (c !== el) c._t0 = c.style.transition;
        c.style.transition = 'none';
        c.style.clipPath = 'inset(100% 0 0 0 ' + (round ? round[0] : '') + ')';
      });
    });
    void document.documentElement.offsetHeight;
    const show = (el) => {
      el.style.transition = 'opacity .7s var(--ease-out-expo),transform .8s var(--ease-spring)';
      this.revealClips(el).forEach(c => { if (c !== el) c.style.transition = 'transform .4s var(--ease-spring),box-shadow .4s ease,clip-path .75s var(--ease-out-expo)'; else c.style.transition += ',clip-path .75s var(--ease-out-expo)'; });
      void el.offsetHeight;
      el.style.opacity = '1'; el.style.transform = 'none';
      this.revealClips(el).forEach(c => { c.style.clipPath = c.getAttribute('data-clip') || 'inset(0)'; });
      setTimeout(() => done(el), 1000);
    };
    this._pending = new Set(targets);
    const watchMap = new Map();
    targets.forEach(el => {
      const w = el.hasAttribute('data-imgclip') ? (el.parentElement || el) : el;
      if (!watchMap.has(w)) watchMap.set(w, []);
      watchMap.get(w).push(el);
    });
    this._instantShow = (el) => { this._pending.delete(el); done(el); };
    this._io = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (!e.isIntersecting) return;
        this._io.unobserve(e.target);
        (watchMap.get(e.target) || []).forEach(el => {
          if (!this._pending.has(el)) return;
          this._pending.delete(el);
          setTimeout(() => show(el), parseInt(el.getAttribute('data-reveal-delay') || '0', 10));
        });
      });
    }, { threshold:0.15, rootMargin:'0px 0px -8% 0px' });
    watchMap.forEach((els, w) => this._io.observe(w));
  }

  setupHeadings(R){
    if (R || !('IntersectionObserver' in window)) return;
    const heads = Array.prototype.slice.call(document.querySelectorAll('[data-words]'));
    heads.forEach(h => this.splitWords(h));
    const show = (h) => {
      (h._words || []).forEach(w => {
        setTimeout(() => {
          w.style.transform = 'translateY(0) rotate(0deg)';
          setTimeout(() => { w.style.removeProperty('transition'); w.style.removeProperty('transform'); }, 900);
        }, w._delay);
      });
    };
    this._pendingH = new Set(heads);
    this._instantHead = (h) => {
      this._pendingH.delete(h); if (this._ioH) this._ioH.unobserve(h);
      (h._words || []).forEach(w => { w.style.transition = 'none'; w.style.transform = 'none'; });
    };
    this._ioH = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) { this._ioH.unobserve(e.target); this._pendingH.delete(e.target); show(e.target); } });
    }, { threshold:0.35 });
    heads.forEach(h => this._ioH.observe(h));
  }

  glossBubble(o){
    const b = document.createElement('span');
    const tint = o.blue ? 'var(--secondary)' : 'var(--primary)';
    b.style.cssText = 'position:absolute;width:' + o.s + 'px;height:' + o.s + 'px;border-radius:9999px;opacity:0;pointer-events:none;will-change:transform,opacity;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3);'
      + 'background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.95) 0%,rgba(255,255,255,.4) 16%,color-mix(in srgb,' + tint + ' 40%,transparent) 50%,color-mix(in srgb,' + tint + ' 10%,transparent) 100%);'
      + (o.blur ? 'filter:blur(2px);' : '');
    return b;
  }
  spawnFoot(layer, cfg, seed){
    const b = this.glossBubble({ s:Math.round(cfg.sMin + Math.random() * (cfg.sMax - cfg.sMin)), blue:Math.random() < 0.18, blur:cfg.blur });
    b.style.left = (Math.random() * 100).toFixed(1) + '%'; b.style.bottom = '-18px';
    layer.appendChild(b);
    const H = layer.clientHeight || 340;
    const rise = H * (0.55 + Math.random() * 0.5);
    const dur = (cfg.dMin + Math.random() * (cfg.dMax - cfg.dMin)) * 1000;
    const w = (Math.random() < 0.5 ? -1 : 1) * (6 + Math.random() * 4);
    const a = b.animate([
      { transform:'translate(0,0) scale(.9)', opacity:0 },
      { opacity:cfg.op, offset:0.12 },
      { transform:'translate(' + w.toFixed(1) + 'px,-' + (rise * 0.33).toFixed(0) + 'px) scale(.97)', offset:0.33 },
      { transform:'translate(' + (-w).toFixed(1) + 'px,-' + (rise * 0.66).toFixed(0) + 'px) scale(1.04)', opacity:cfg.op, offset:0.66 },
      { transform:'translate(' + (w * 0.6).toFixed(1) + 'px,-' + rise.toFixed(0) + 'px) scale(1.15)', opacity:0 }
    ], { duration:dur, delay: seed ? -Math.random() * dur * 0.9 : Math.random() * 400, easing:'linear' });
    a.onfinish = () => { b.remove(); if (this._alive) this.spawnFoot(layer, cfg, false); };
  }
  setupBubbles(R){
    const amb = document.querySelector('[data-bubbles]');
    const foot = this.footBox = document.querySelector('[data-footerbubbles]');
    const secs = Array.prototype.slice.call(document.querySelectorAll('[data-secbubbles]'));
    if (R) {
      if (amb) for (let i = 0; i < 18; i++) { const b = this.glossBubble({ s:Math.round(5 + Math.random() * 11), blue:i % 4 === 0, blur:i % 3 === 0 }); b.style.left = (Math.random() * 100).toFixed(1) + '%'; b.style.bottom = (Math.random() * 96).toFixed(0) + '%'; b.style.opacity = '.14'; amb.appendChild(b); }
      return;
    }
    if (amb) [
      { n:16, blur:true,  op:0.14, sMin:7, sMax:17, dMin:20, dMax:30 },
      { n:22, blur:false, op:0.24, sMin:6, sMax:13, dMin:14, dMax:22 }
    ].forEach(cfg => { const layer = document.createElement('div'); layer.style.cssText = 'position:fixed;left:0;right:0;bottom:0;top:0;will-change:transform'; amb.appendChild(layer); for (let i = 0; i < cfg.n; i++) this.spawnFoot(layer, cfg, true); });
    secs.forEach(sec => {
      const n = parseInt(sec.getAttribute('data-seed-count') || '10', 10);
      const cfg = { blur:false, op:0.32, sMin:6, sMax:16, dMin:9, dMax:15 };
      const layer = document.createElement('div'); layer.style.cssText = 'position:absolute;inset:0;will-change:transform'; sec.appendChild(layer);
      for (let i = 0; i < n; i++) this.spawnFoot(layer, cfg, true);
    });
    if (!foot) return;
    [
      { n:18, blur:true,  op:0.16, sMin:6, sMax:14, dMin:14, dMax:18 },
      { n:22, blur:false, op:0.32, sMin:5, sMax:12, dMin:8,  dMax:12 }
    ].forEach(cfg => {
      const layer = document.createElement('div');
      layer.style.cssText = 'position:absolute;inset:0;will-change:transform';
      foot.appendChild(layer);
      for (let i = 0; i < cfg.n; i++) this.spawnFoot(layer, cfg, true);
    });
  }

  setupCursorFizz(R){
    this._fizzBar = document.querySelector('[data-scrollfizz]');
    if (R) return;
    const spot = document.querySelector('[data-spotlight]');
    const canvas = document.querySelector('[data-fizzcanvas]');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(2, window.devicePixelRatio || 1);
    const fit = () => { canvas.width = Math.floor(innerWidth * DPR); canvas.height = Math.floor(innerHeight * DPR); canvas.style.width = innerWidth + 'px'; canvas.style.height = innerHeight + 'px'; ctx.setTransform(DPR,0,0,DPR,0,0); };
    fit(); this._onResizeFizz = fit; window.addEventListener('resize', fit);
    const parts = [];
    let mx = innerWidth / 2, my = innerHeight / 2, px = mx, py = my, moved = 0, spawnAcc = 0;
    this._cursorMove = (e) => {
      mx = e.clientX; my = e.clientY; moved = 1;
      if (spot) { spot.style.opacity = '1'; spot.style.transform = 'translate(' + (mx - innerWidth / 2).toFixed(0) + 'px,' + (my - innerHeight / 2).toFixed(0) + 'px)'; }
    };
    window.addEventListener('mousemove', this._cursorMove, { passive:true });
    this._cursorLeave = () => { if (spot) spot.style.opacity = '0'; };
    document.addEventListener('mouseleave', this._cursorLeave);
    this._cursorClick = (e) => { const n = 14; for (let i = 0; i < n; i++) { const a = (Math.PI * 2 * i) / n + Math.random() * 0.5; const sp = 1.4 + Math.random() * 2.6; parts.push({ x:e.clientX, y:e.clientY, vx:Math.cos(a) * sp, vy:Math.sin(a) * sp - 1, r:2 + Math.random() * 3.5, life:1, blue:Math.random() < 0.25, burst:true }); }
      const ring = document.createElement('div'); ring.setAttribute('data-cursor-ring',''); ring.style.cssText = 'position:fixed;left:' + e.clientX + 'px;top:' + e.clientY + 'px;z-index:9997;pointer-events:none;width:34px;height:34px;border-radius:9999px;border:2px solid color-mix(in srgb,var(--primary) 60%,transparent);transform:translate(-50%,-50%);animation:ringPop .55s ease-out forwards'; document.body.appendChild(ring); setTimeout(() => ring.remove(), 560);
    };
    window.addEventListener('mousedown', this._cursorClick, { passive:true });
    const draw = () => {
      ctx.clearRect(0, 0, innerWidth, innerHeight);
      const dx = mx - px, dy = my - py, sp = Math.hypot(dx, dy); px += dx * 0.25; py += dy * 0.25;
      if (moved) { spawnAcc += sp; while (spawnAcc > 26) { spawnAcc -= 26; parts.push({ x:mx + (Math.random() * 16 - 8), y:my + (Math.random() * 16 - 8), vx:(Math.random() * 2 - 1) * 0.5, vy:-0.5 - Math.random() * 1.1, r:1.6 + Math.random() * 3, life:1, blue:Math.random() < 0.2 }); } }
      for (let i = parts.length - 1; i >= 0; i--) {
        const p = parts[i];
        p.x += p.vx; p.y += p.vy; p.vy += p.burst ? 0.06 : -0.012; p.vx *= 0.98; p.life -= p.burst ? 0.022 : 0.012;
        if (p.life <= 0) { parts.splice(i, 1); continue; }
        const rgb = p.blue ? '23,71,157' : '0,102,179';
        const grd = ctx.createRadialGradient(p.x - p.r * 0.3, p.y - p.r * 0.3, 0, p.x, p.y, p.r);
        grd.addColorStop(0, 'rgba(255,255,255,' + (0.9 * p.life) + ')');
        grd.addColorStop(0.4, 'rgba(' + rgb + ',' + (0.55 * p.life) + ')');
        grd.addColorStop(1, 'rgba(' + rgb + ',0)');
        ctx.beginPath(); ctx.fillStyle = grd; ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      }
      if (parts.length > 420) parts.splice(0, parts.length - 420);
      this._fizzRaf = requestAnimationFrame(draw);
    };
    this._fizzRaf = requestAnimationFrame(draw);
  }

  setupMagnetic(){
    Array.prototype.slice.call(document.querySelectorAll('[data-magnetic]')).forEach(el => {
      el.addEventListener('mousemove', (e) => {
        const r = el.getBoundingClientRect();
        const dx = e.clientX - (r.left + r.width / 2), dy = e.clientY - (r.top + r.height / 2);
        el.style.transition = 'transform .1s linear';
        el.style.transform = 'translate(' + (dx * 0.25).toFixed(1) + 'px,' + (dy * 0.3).toFixed(1) + 'px)';
      });
      el.addEventListener('mouseleave', () => { el.style.transition = 'transform .5s var(--ease-spring)'; el.style.transform = 'translate(0,0)'; });
    });
  }

  _updateFizzBar(){ if (!this._fizzBar) return; const vh = window.innerHeight; const mx = document.documentElement.scrollHeight - vh; const p = mx > 0 ? Math.max(0, Math.min(1, window.scrollY / mx)) : 0; this._fizzBar.style.transform = 'scaleX(' + p.toFixed(4) + ')'; }

  loop(){
    const step = () => {
      const y = window.scrollY;
      this.blobs.forEach(b => { const rate = parseFloat(b.getAttribute('data-rate') || '1'); b.style.translate = '0 ' + (-y * 0.06 * rate).toFixed(1) + 'px'; });
      this._updateFizzBar();
      this._raf = requestAnimationFrame(step);
    };
    this._raf = requestAnimationFrame(step);
  }

  renderVals(){
    const S = this.state;
    const navItems = [
      { label:'Company', href:'index.html' },
      { label:'Products', href:'products.html' },
      { label:'Careers', href:'#' },
      { label:'Maps', href:'#' },
      { label:'Blogs', href:'news.html', active:true },
      { label:'Contact us', href:'contact.html' },
    ].map(it => ({ label:it.label, href:it.href, active:!!it.active, color:it.active ? 'var(--primary)' : 'var(--foreground)' }));

    const FILTERS = ['All','Company','Marketing','Brands','Financial','innovation'];
    const filters = FILTERS.map(label => {
      const sel = S.filter === label;
      return {
        label,
        bg: sel ? 'var(--secondary)' : 'transparent',
        fg: sel ? 'var(--secondary-foreground)' : 'var(--foreground)',
        border: sel ? 'var(--secondary)' : 'var(--input)',
        shadow: sel ? '0 10px 22px color-mix(in srgb,var(--secondary) 30%,transparent)' : 'none',
        onPick: () => this.setState({ filter:label }),
      };
    });

    const NEWS = [
      { src:'assets/news/fruit-splash.jpg', cat:'Brands', featured:true, tag:'Brands', title:'Lorem ipsum dolor sit amet, consectetuer adipiscing elit,', date:'20 July 2026' },
      { src:'assets/news/factory.jpg', cat:'Company', aspect:'4/3', title:'Lorem ipsum dolor sit joleb amet, consectetuer Lorem adipiscing elitipsum .', date:'20 July 2026' },
      { src:'assets/news/orange-tree.jpg', cat:'innovation', aspect:'4/3', title:'Lorem ipsum dolor sit joleb amet, consectetuer Lorem adipiscing elitipsum .', date:'20 July 2026' },
      { src:'assets/news/cans-held.jpg', cat:'Brands', aspect:'1/1', title:'Lorem ipsum dolor sit joleb amet, consectetuer Lorem adipiscing elitipsum .', date:'20 July 2026' },
      { src:'assets/news/beach-lemon.jpg', cat:'Marketing', aspect:'1/1', title:'Lorem ipsum dolor sit joleb amet, consectetuer Lorem adipiscing elitipsum .', date:'20 July 2026' },
      { src:'assets/news/summer-mood.jpg', cat:'Marketing', aspect:'1/1', title:'Lorem ipsum dolor sit joleb amet, consectetuer Lorem adipiscing elitipsum .', date:'20 July 2026' },
    ];
    const visible = NEWS.filter(n => S.filter === 'All' || n.cat === S.filter);
    const cards = visible.map((n, i) => ({
      src:n.src, title:n.title, date:n.date, tag:n.tag || n.cat, aspect:n.aspect || '4/3',
      isFeatured: !!n.featured && S.filter === 'All',
      isNormal: !(n.featured && S.filter === 'All'),
      delay:String(Math.min(i, 4) * 80),
    }));

    const footerCols = [
      { h:'ABOUT US', links:[{label:'Our Company',href:'index.html'},{label:'Our Brands',href:'products.html'},{label:'Investors',href:'#'},{label:'Policies, Practices & Reports',href:'#'},{label:'Careers',href:'#'}] },
      { h:'Need Help?', links:[{label:'FAQ',href:'#'},{label:'Contact Us',href:'contact.html'},{label:'International',href:'#'}] },
      { h:'Useful links', links:[{label:'Privacy Policy',href:'#'},{label:'Cookies Policy',href:'#'},{label:'Cookies Settings',href:'#'},{label:'Notice at Collection',href:'#'},{label:'Do Not Sell or Share My Personal Information',href:'#'},{label:'Terms of Service',href:'#'}] },
    ];

    return {
      headerShadow: S.scrolled ? '0 10px 30px color-mix(in srgb,var(--foreground) 14%,transparent), inset 0 -1px 0 color-mix(in srgb,var(--card) 70%,transparent)' : '0 1px 0 var(--border)',
      headerBg: S.scrolled ? 'color-mix(in srgb,var(--card) 52%,transparent)' : 'var(--card)',
      headerPadY: S.scrolled ? '12px' : '16px',
      navEnter: () => { const d = document.querySelector('[data-navdim]'); if (d) d.style.opacity = '1'; },
      navLeave: () => { const d = document.querySelector('[data-navdim]'); if (d) d.style.opacity = '0'; },
      menuOpen: S.menuOpen,
      toggleMenu: () => this.setState(st => ({ menuOpen: !st.menuOpen })),
      closeMenu: () => this.setState({ menuOpen:false }),
      navItems, filters, cards, footerCols,
      hasCards: cards.length > 0,
      noCards: cards.length === 0,
    };
  }
}
